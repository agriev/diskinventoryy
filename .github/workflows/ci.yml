name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Build & Test
    runs-on: macos-14
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build & test
        run: |
          set -o pipefail
          xcodebuild \
            -project DiskInventoryY.xcodeproj \
            -scheme DiskInventoryY \
            -destination 'platform=macOS' \
            -resultBundlePath build/DiskInventoryY.xcresult \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build test

      - name: Upload xcresult on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcresult
          path: build/DiskInventoryY.xcresult
          retention-days: 7
